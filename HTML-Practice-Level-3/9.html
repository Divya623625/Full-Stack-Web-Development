<!-- 
https://www.google.com/search?q=apple 
 1️⃣ User types data
<input type="text" name="username">
User enters: Divya

2️⃣ User clicks Submit
Browser collects name + value

3️⃣ Data is sent to server
username=Divya

4️⃣ Server reads it
Server uses username to get the value Divya

Step-by-step flow
1️⃣ Page-1 (Form page)
<form action="result.html">
  <input type="text" name="username">
  <button type="submit">Submit</button>
</form>
User types: Divya

2️⃣ Browser sends data
When submit is clicked, browser sends:
result.html?username=Divya

3️⃣ Page-2 (Next page / server)
result.html receives username
It can read and show the data
How connection happens
action → tells which page to open
name → tells what data is sent
Value → what user typed
