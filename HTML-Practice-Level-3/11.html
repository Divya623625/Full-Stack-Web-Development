<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown</title>
</head>
<body>
    <form action="/action">
    <div>
        Choose your profession
        <select name="profession" id="profession">
        <option>Select your option</option>
        <option value="stu" >Student</option>
        <option value="dev" >Developer</option>
        </select>
    </div>
    <button>Submit</button>
    </form>
</body>
</html>

<!-- Dropdown in HTML
Dropdown is created using <select> tag.
It shows a list of options to choose one.

<select>
  <option>India</option>
  <option>USA</option>
  <option>UK</option>
</select>

<select> → creates dropdown
<option> → items inside dropdown
✅ Result: User clicks and selects one option from the list. 

<option value="stu" selected>Student</option>-->
