<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
</head>
<body>
    <form action="/server">
        <input type="checkbox" id="age" name="age" checked>
        <label for="age">I am 18+</label>
        <br>
        <div>
        <input type="radio" name="fruit" id="apple" value="apple" >
        <label for="apple">apple</label>
        <input type="radio" name="fruit" id="mango" value="mango">
        <label for="apple">mango</label>
        <input type="radio" name="fruit" id="banana" value="banana">
        <label for="apple">banana</label>
        </div>
        <br>
        <div>
        <input type="radio" name="fruit1" id="apple" value="apple" >
        <label for="apple">apple</label>
        <input type="radio" name="fruit2" id="mango" value="mango">
        <label for="apple">mango</label>
        <input type="radio" name="fruit3" id="banana" value="banana">
        <label for="apple">banana</label>
        </div>

        <br>
        <div>
            Choose your subjects
            <input type="checkbox" id="math" name="subjects" value="math">
            <label for="math">Math</label>
            <input type="checkbox" id="science" name="subjects" value="sci" >
            <label for="science">Science</label>
            <input type="checkbox" id="english" name="subjects" value="eng">
            <label for="english">English</label>
        </div>
        <button>Submit</button>
    </form>
</body>
</html>

1️⃣ Checkbox

2️⃣ Radio Button
