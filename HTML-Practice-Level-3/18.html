<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Qs2 on Forms</title>
</head>
<body>
    <H2>Feedback Form</H2>
    <form action="/contact">
    <label for="name">Name: </label>
    <input type="text" placeholder="Write your name" id="name" name="name">
    <br> <br>

    <label for="email">Email: </label>
    <input type="text" placeholder="Write your email" id="email" name="email">
    <br> <br>

    <label for="message">Message: </label><br>
    <textarea id="message" name="message" rows="4" cols="30"></textarea>
    <br><br>

    <label for="rating">Rate us our of 5: </label>
    <br>
    <input type="radio" id="one" name="rating" value="one">
    <label for="one">1</label>
    <br>
    <input type="radio" id="two" name="rating" value="two">
    <label for="two">2</label>
    <br>
    <input type="radio" id="three" name="rating" value="three">
    <label for="three">3</label>
    <br>
    <input type="radio" id="four" name="rating" value="four">
    <label for="four">4</label>
    <br>
    <input type="radio" id="five" name="rating" value="five">
    <label for="five">5</label>
    <br>
    <br><br>
    <button>Send your Message!</button>
    </form>
</body>
</html>
