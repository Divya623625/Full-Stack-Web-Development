<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/action">
    <div>
        <label for="Username">Username:</label>
        <input type="text" placeholder="Enter username" id="Username">
    </div>
    <br>
    <div>
        <label for="password">Password:</label>
        <input type="password" placeholder="Enter password" id="password">
    </div>
    <br>
    <div>
        <label for="age">Age:</label>
        <input type="number" placeholder="Enter age" id="age">
    </div>

    </form>
</body>
</html>

<!-- <div> means division.
It is used to group elements and design layout.
Example -
<div>
  <h1>Hello</h1>
  <p>Welcome</p>
</div>

        <label for="Username">Username:</label>
        <input type="text" placeholder="Enter username" id="Username">

<label> → shows the text Username: on the webpage.
for="Username" → connects the label with the input field.
<input type="text"> → creates a text box to type.
placeholder="Enter username" → shows light text inside the box.
id="Username" → same name used in label for, so they are connected.
Result:
Username: [ Enter username ]
If you click Username text, the input box automatically activates. -->
