<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form action="/action">
    <!-- <input/> -->
    <label>
    Username
    <input type="text" placeholder="Enter username">
    </label>
    <br>

    <label>
    Password
    <input type="password" placeholder="Enter password">
    </label>
    <br>

    <label>
    Number
    <input type="number" placeholder="Enter number">
    </label>
    <br>

    <label>
    Time
    <input type="time" placeholder="Enter time">
    </label>
    <br>

    <label>
    Color
    <input type="color" placeholder="Enter color">
    </label>
    <br>

    </form>
</body>
</html>

<!-- 
Action attribute is used to define what action needs to be performed when a form is 
submitted or where the form data should be sent.
<form action="/action.php">
<form action="/action">

<label> is used to name an input field in a form.
<label> connects text with an input field to make forms clear and easy to use.
When you click the label text, the input gets selected (very user-friendly).

Example -
<label for="name">Name:</label>
<input type="text" id="name"> 

Classical approach means using for in <label> and id in <input> to connect them.
Example -
<label for="username">Username-</label>
<input type="text" id="username">

-->
