<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Element</title>
</head>
<body>
    <p><a href="google.com">Google</a></p>
    <p><a href="https://google.com"> Welcome to google </a></p>
    <p><a href="https://www.netflix.com/in/"> Welcome to Netflix </a></p>
    <!-- 
    <a>-Opening tag
    </a>-Closing tag
    href - hypertext reference attributes - website the link opens
    href="https://google.com" - absolute path 
    relative path - file - A link that connects files within the same website.
    using file paths,not full URL
    | Home address | -> Connects |        | -> Relative link 
    -->
</body>
</html>
