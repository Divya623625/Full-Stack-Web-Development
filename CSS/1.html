<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Chapter - 1</title>
    <link rel="stylesheet" href="stylesheet">
</head>
<body>
    <style>
        h1{
            color:red;
            background-color:black;
        }
    </style>
<!-- Inline Style 
Drawback of Inline CSS:
❌ Cannot reuse – must write CSS for every tag
❌ Makes HTML messy
❌ Hard to manage for large websites
👉 In one line: Inline CSS is not good for large websites.-->
    <!-- <h1 style="color:rebeccapurple">Divya P</h1>
    <h1 style="color:red">This is a Paragraph!!</h1>
    <h1 style="color:red">Sushmitha</h1>
    <h1 style="color:red">Hello World</h1>
    <p style="color:darkgreen">Paragraph</p>
    <button style="color:blue; background-color:white">Help</button>
    <button style="color:blue; background-color:orange">Help</button> -->

    <!-- Style Tag -->
     <h1>Divya P</h1>
    <h1>This is a Paragraph!!</h1>
    <h1>Sushmitha</h1>
    <h1>Hello World</h1>

<!-- Drawback of Internal (Style) CSS:
❌ Cannot use in multiple webpages
❌ CSS works only in that single HTML page. -->
      
<!-- External Stylesheet → CSS is written in a separate .css file and linked to HTML. -->
</body>
</html>
