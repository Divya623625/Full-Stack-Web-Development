<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline vs Block</title>
</head>
<body>
    <div>
    <a href="www.google.com">Google</a>
    <a href="www.youtube.com">Youtube</a>
    </div>
    <a href="www.facebook.com">Facebook</a>

    <p>-----------------------------------</p>

    <span>
    <a href="www.google.com">Google</a>
    <a href="www.youtube.com">Youtube</a>
    </span>
    <a href="www.facebook.com">Facebook</a>
</body>
</html>

<!-- 
<div> tag
• <div> means division (section of a webpage).
• It is a block element.
• It takes full width and starts in a new line.
• Used to group large parts of a page (sections, layout).

Example:
<div>
   <h1>Welcome</h1>
   <p>This is my webpage</p>
</div>

<span> tag
• <span> is used for small part of text.
• It is an inline element.
• It does not start on a new line.
• Mostly used for styling text with CSS.

Example:
<p>Hello <span>Divya</span> </p>
-->
