<!-- <nav> tag
• <nav> is used to keep website menu links.
• It tells the browser this part is for navigation (moving to other pages).

Example
<nav>
  <a href="home.html">Home</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

Output idea:
Home | About | Contact

Simple meaning:
